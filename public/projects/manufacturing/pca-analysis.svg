<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad2)" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="40" fill="#f5e6d3" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">
    PCA Component Analysis
  </text>
  
  <!-- PCA visualization - component loadings -->
  <g transform="translate(100, 80)">
    <!-- PC1 axis -->
    <line x1="0" y1="150" x2="600" y2="150" stroke="rgba(232, 184, 120, 0.3)" stroke-width="2"/>
    <text x="300" y="180" fill="#a8a8b0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">
      PC1 (33.52% Variance)
    </text>
    
    <!-- PC2 axis -->
    <line x1="300" y1="0" x2="300" y2="300" stroke="rgba(232, 184, 120, 0.3)" stroke-width="2"/>
    <text x="320" y="150" fill="#a8a8b0" font-family="Arial, sans-serif" font-size="12" transform="rotate(-90, 320, 150)">
      PC2 (20.43% Variance)
    </text>
    
    <!-- Data points representing variables -->
    <g>
      <!-- Temperature -->
      <circle cx="450" cy="120" r="15" fill="#4a9eff" opacity="0.8"/>
      <text x="450" y="125" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
        Temp
      </text>
      
      <!-- Machine Speed -->
      <circle cx="150" cy="180" r="15" fill="#e8b878" opacity="0.8"/>
      <text x="150" y="185" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
        Speed
      </text>
      
      <!-- Pressure -->
      <circle cx="420" cy="100" r="15" fill="#ff6b6b" opacity="0.8"/>
      <text x="420" y="105" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
        Press
      </text>
      
      <!-- Energy -->
      <circle cx="350" cy="220" r="15" fill="#51cf66" opacity="0.8"/>
      <text x="350" y="225" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
        Energy
      </text>
      
      <!-- Vibration -->
      <circle cx="200" cy="100" r="15" fill="#ffd43b" opacity="0.8"/>
      <text x="200" y="105" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
        Vib
      </text>
      
      <!-- Quality -->
      <circle cx="300" cy="50" r="15" fill="#ff922b" opacity="0.8"/>
      <text x="300" y="55" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
        Quality
      </text>
    </g>
    
    <!-- Cluster circles -->
    <circle cx="350" cy="130" r="120" fill="none" stroke="rgba(74, 158, 255, 0.3)" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="350" y="280" fill="#4a9eff" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
      Process Intensity Cluster
    </text>
  </g>
  
  <!-- Stats -->
  <g transform="translate(100, 380)">
    <rect width="600" height="50" fill="rgba(0,0,0,0.3)" rx="8"/>
    <text x="300" y="30" fill="#f5e6d3" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">
      PC1: 33.52% • PC2: 20.43% • PC3: 13.99% • Total: 67.94%
    </text>
  </g>
</svg>