<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#4a9eff;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" rx="12"/>
  
  <!-- Grid lines -->
  <g stroke="rgba(232, 184, 120, 0.1)" stroke-width="1">
    <line x1="100" y1="80" x2="700" y2="80"/>
    <line x1="100" y1="140" x2="700" y2="140"/>
    <line x1="100" y1="200" x2="700" y2="200"/>
    <line x1="100" y1="260" x2="700" y2="260"/>
    <line x1="100" y1="320" x2="700" y2="320"/>
  </g>
  
  <!-- Chart area -->
  <g fill="url(#chartGrad)" opacity="0.3">
    <path d="M100,320 L150,280 L200,290 L250,220 L300,240 L350,180 L400,200 L450,140 L500,160 L550,100 L600,120 L650,80 L700,80 L700,320 Z"/>
  </g>
  
  <!-- Data line -->
  <path d="M100,320 L150,280 L200,290 L250,220 L300,240 L350,180 L400,200 L450,140 L500,160 L550,100 L600,120 L650,80 L700,80" 
        fill="none" stroke="#4a9eff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Data points -->
  <g fill="#4a9eff">
    <circle cx="100" cy="320" r="4"/>
    <circle cx="150" cy="280" r="4"/>
    <circle cx="200" cy="290" r="4"/>
    <circle cx="250" cy="220" r="4"/>
    <circle cx="300" cy="240" r="4"/>
    <circle cx="350" cy="180" r="4"/>
    <circle cx="400" cy="200" r="4"/>
    <circle cx="450" cy="140" r="4"/>
    <circle cx="500" cy="160" r="4"/>
    <circle cx="550" cy="100" r="4"/>
    <circle cx="600" cy="120" r="4"/>
    <circle cx="650" cy="80" r="4"/>
    <circle cx="700" cy="80" r="4"/>
  </g>
  
  <!-- Title -->
  <text x="100" y="50" fill="#f5e6d3" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
    Manufacturing Defect Analysis
  </text>
  
  <!-- Subtitle -->
  <text x="100" y="70" fill="#a8a8b0" font-family="Arial, sans-serif" font-size="14">
    Multivariate Statistical Modeling • Quality Intelligence
  </text>
  
  <!-- Axis labels -->
  <text x="400" y="400" fill="#a8a8b0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">
    Observations (Time)
  </text>
  
  <text x="50" y="200" fill="#a8a8b0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" transform="rotate(-90, 50, 200)">
    Quality Score
  </text>
  
  <!-- Legend -->
  <g transform="translate(600, 380)">
    <rect width="12" height="12" fill="#4a9eff" rx="2"/>
    <text x="20" y="10" fill="#a8a8b0" font-family="Arial, sans-serif" font-size="12">
      Quality Trend
    </text>
  </g>
  
  <!-- Stats box -->
  <g transform="translate(580, 360)">
    <rect width="180" height="80" fill="rgba(0,0,0,0.5)" rx="8"/>
    <text x="15" y="25" fill="#e8b878" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
      Key Metrics
    </text>
    <text x="15" y="45" fill="#f5e6d3" font-family="Arial, sans-serif" font-size="11">
      R² = 0.297 • p &lt; 0.001
    </text>
    <text x="15" y="65" fill="#f5e6d3" font-family="Arial, sans-serif" font-size="11">
      10/55 Out of Control Signals
    </text>
  </g>
</svg>