<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080808;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8b878;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5d4a3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g stroke="rgba(232, 184, 120, 0.05)" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
  </g>
  
  <!-- Name -->
  <text x="100" y="250" fill="#f5e6d3" font-family="Arial, sans-serif" font-size="72" font-weight="bold">
    NIKHIL KHETAVATH
  </text>
  
  <!-- Title -->
  <text x="100" y="320" fill="url(#accent)" font-family="Arial, sans-serif" font-size="36" font-weight="600">
    AI Product Engineer
  </text>
  
  <!-- Tagline -->
  <text x="100" y="380" fill="#a8a8b0" font-family="Arial, sans-serif" font-size="24">
    From Notebook to Production
  </text>
  
  <!-- Accent line -->
  <rect x="100" y="420" width="200" height="4" fill="url(#accent)" rx="2"/>
  
  <!-- URL -->
  <text x="100" y="580" fill="#777777" font-family="Arial, sans-serif" font-size="18">
    nikhilkhetavath.dev
  </text>
</svg>